# ===================================================
# RRA Tax Handbook Backend Configuration
# ===================================================

spring.application.name=TaxHandbookBackend

# ===================================================
# Database Configuration
# PostgreSQL defaults (can still be overridden by env vars).
# ===================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tax_handbook_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Ineza@2005}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

# ===================================================
# JPA / Hibernate
# ===================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.format_sql=true

# ===================================================
# JWT Configuration
# ===================================================
jwt.secret=rra-tax-handbook-super-secret-key-2024-do-not-share-this-key
jwt.expiration=86400000

# ===================================================
# Server
# ===================================================
server.port=8080

# ===================================================
# CORS (handled in SecurityConfig, but declared here)
# ===================================================
frontend.url=http://localhost:5173
